<html>
    <head>
        <style>
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 700px;
            }
            .wrapper{
                display: flex;
            }
            .stick{
                width: 10px;
                height: 500px;
                background-color: black;
                border-top-left-radius: 10px;   
                border-bottom-left-radius: 5px;
                border-bottom-right-radius: 5px;
            }
            .flag{
                width: 250px;
                height: 150px;
                background-color: transparent;
                border-top-right-radius: 10px;   
                border-bottom-right-radius: 10px;
                box-shadow: 0px 0px 10px 5px rgba(0,0,0,0.75);
            }
            .flag {
                width: 250px;
                height: 150px;
                box-shadow: 0px 0px 90px 1px #989;
                background-color: transparent;
            }
            .top {
                height: 60px;
                background-color: orange
            }

            .middle {
                height: 60px;
                background-color: white
            }

            .bottom {
                height: 60px;
                background-color: green
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="stick"></div>
            <div class="flag">
                <div class="top"></div>
                <div class="middle">
                    <div class="wheel">
                        <img src="C:/Users/Devendra/Downloads/Ashok Chakra.png" alt="wheel" style="width: 50px; height: 50px; border-radius: 50%; margin: 5px auto; display: block;">
                    </div>
                </div>
                <div class="bottom"></div>
            </div>
        </div>
    </body>
</html>
